{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NotesBridge{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/notesbridge.css' %}?v=1.8">
</head>
<body class="{% block body_class %}{% endblock %}">
    <header class="site-header">
        <div class="container">
            <nav class="nav-wrap" aria-label="Primary">
                <a href="{% url 'home' %}" class="brand" aria-label="NotesBridge home">
                    <span class="brand-mark">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg>
                    </span>
                    <span>
                        <strong>NotesBridge</strong>
                        <small>Campus Knowledge</small>
                    </span>
                </a>

                <div class="main-nav">
                    <a href="{% url 'dashboard' %}" class="nav-link {% block nav_dashboard %}{% endblock %}" style="display:inline-flex; align-items:center; gap:6px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        Dashboard
                    </a>
                    <a href="{% url 'browse_notes' %}" class="nav-link {% block nav_browse %}{% endblock %}" style="display:inline-flex; align-items:center; gap:6px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                        Browse Notes
                    </a>
                    <a href="{% url 'upload' %}" class="nav-link {% block nav_upload %}{% endblock %}" style="display:inline-flex; align-items:center; gap:6px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        Upload
                    </a>
                    <a href="{% url 'leaderboard' %}" class="nav-link {% block nav_leaderboard %}{% endblock %}" style="display:inline-flex; align-items:center; gap:6px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>
                        Leaderboard
                    </a>
                    <a href="{% url 'profile' %}" class="nav-link {% block nav_profile %}{% endblock %}" style="display:inline-flex; align-items:center; gap:6px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        Profile
                    </a>
                </div>

                {% if user.is_authenticated %}
                <div class="button-row">
                    <a href="{% url 'logout' %}" class="btn btn-ghost" style="display:inline-flex; align-items:center; gap:6px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        Logout
                    </a>
                </div>
                {% else %}
                <div class="button-row">
                    <a href="{% url 'login' %}" class="btn btn-light">Login</a>
                    <a href="{% url 'register' %}" class="btn btn-primary">Sign up</a>
                </div>
                {% endif %}
            </nav>
        </div>
    </header>

    {% block content %}{% endblock %}
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.vote-button').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const url = this.getAttribute('href');

                    fetch(url, {
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    })
                    .then(response => response.json())
                    .then(data => {
                        // Find the note container to update counts and states
                        const actionsContainer = this.closest('.note-actions');
                        const upvoteBtn = actionsContainer.querySelector('.vote-button:not(.down)');
                        const downvoteBtn = actionsContainer.querySelector('.vote-button.down');

                        // Update counts
                        upvoteBtn.querySelector('strong').textContent = data.upvotes;
                        downvoteBtn.querySelector('strong').textContent = data.downvotes;

                        // Handle class toggling locally to reflect the new state instantly
                        if (this === upvoteBtn) {
                            if (upvoteBtn.classList.contains('active')) {
                                upvoteBtn.classList.remove('active');
                            } else {
                                upvoteBtn.classList.add('active');
                                downvoteBtn.classList.remove('active');
                            }
                        } else {
                            if (downvoteBtn.classList.contains('active')) {
                                downvoteBtn.classList.remove('active');
                            } else {
                                downvoteBtn.classList.add('active');
                                upvoteBtn.classList.remove('active');
                            }
                        }
                    });
                });
            });
        });
    </script>
</body>
</html>
